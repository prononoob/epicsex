<!DOCTYPE html>
<html>
	<head>
		<title>Tytul</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="styloowa.css">
	</head>
	<body>
		<h1>Porter kalkulator</h1>
		<h2>⚝ ⚝ ⚝ Porter ma 47.5 ml alkoholu ⚝ ⚝ ⚝</h2>
		<div class="flex-container">
			<div class="flex-child">
				<h2>⚝ Parametry</h2>
				<p>Mililitry</p>
				<input type="text" class="pole-txt" id="porterBox1"><br/>
				<p>Procent</p>
				<input type="text" class="pole-txt" id="porterBox2"><br/><br/>
				<input type="button" class="button" value="Oblicz" onclick="calcSum()">
			</div>
			<div class="flex-child arrow-porter">
				<p>-></p>
			</div>
			<div class="flex-child">
				<h2>⚝ Wynik</h2>
				<p>Ilosc mililitrow</p>
				<input type="text" class="pole-txt" id="porterWynik" readonly><br/>
				<p>Ilosc porterow</p>
				<input type="text" class="pole-txt" id="porterIlosc" readonly><br/>
			</div>
		</div>

		<script>
			function calcSum(){
				let box1 = document.getElementById("porterBox1").value;
				let box2 = document.getElementById("porterBox2").value;
				let wynik = Number(box1) * Number(box2) * 0.01;
				document.getElementById("porterWynik").value = wynik;
				wynik = wynik / 47.5;
				document.getElementById("porterIlosc").value = wynik;
			}
		</script>
	</body>
</html>
