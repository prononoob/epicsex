<!DOCTYPE html>
<html>
	<head>
		<title>Tytul</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="styloowa.css">
	</head>
	<body>
		<h1>Porter kalkulator</h1>
		<h2>⚝ ⚝ ⚝ Porter ma 47.5 ml alkoholu ⚝ ⚝ ⚝</h2>
		<div class="flex-container">
			<div class="flex-child">
				<h2>⚝ Parametry</h2>
				<p>Mililitry</p>
				<input type="text" class="pole-txt" id="porterBoxMl"><br/>
				<p>Procent</p>
				<input type="text" class="pole-txt" id="porterBoxPr"><br/><br/>
				<input id="porterButton" type="button" class="button" value="Oblicz" onclick="calcSum()">
			</div>
			<div class="flex-child arrow-porter">
				<p>-></p>
			</div>
			<div class="flex-child">
				<h2>⚝ Wynik</h2>
				<p>Ilosc mililitrow</p>
				<input type="text" class="pole-txt" id="porterWynik" readonly><br/>
				<p>Ilosc porterow</p>
				<input type="text" class="pole-txt" id="porterIlosc" readonly><br/>
			</div>
		</div>

		<script>
    var box1 = document.getElementById("porterBoxMl");
    var box2 = document.getElementById("porterBoxPr");

    box1.addEventListener("keypress", function(event)) {
        if (event.key === "Enter"){
            event.preventDefault();
            document.getElementById("porterButton").click();
        }
    }

box2.addEventListener("keypress", function(event)) {
        if (event.key === "Enter"){
            event.preventDefault();
            document.getElementById("porterButton").click();
        }
    }

			function calcSum(){
				let box1val = box1.value;
				let box2val = box2.value;
				let wynik = Number(box1val) * Number(box2val) * 0.01;
				document.getElementById("porterWynik").value = wynik;
				wynik = wynik / 47.5;
				document.getElementById("porterIlosc").value = wynik;
			}
		</script>
	</body>
</html>
